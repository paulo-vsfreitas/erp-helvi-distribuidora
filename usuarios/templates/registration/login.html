{% extends "core/base.html" %}

{% block title %}Login | Helvi{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 420px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-4 text-center">Acessar sistema</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
