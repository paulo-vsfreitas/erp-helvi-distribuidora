<div class="empty-state">
    <div class="empty-state__icon">
        <i class="bi bi-{{ icon|default:'inbox' }}"></i>
    </div>

    <h3>{{ title|default:"Nenhum registro encontrado" }}</h3>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    {% if button_url %}
        <a href="{{ button_url }}" class="btn btn-primary">
            {% if button_icon %}
                <i class="bi bi-{{ button_icon }}"></i>
            {% endif %}
            {{ button_text }}
        </a>
    {% endif %}
</div>
