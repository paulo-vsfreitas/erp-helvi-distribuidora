<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h2 class="mb-1">{{ titulo }}</h2>

        {% if subtitulo %}
            <p class="text-muted mb-0">
                {{ subtitulo }}
            </p>
        {% endif %}
    </div>

    {% if botao_url %}
        <a href="{{ botao_url }}" class="btn btn-primary">

            {% if botao_icon %}
                <i class="{{ botao_icon }}"></i>
            {% endif %}

            {{ botao_texto }}

        </a>
    {% endif %}

</div>
