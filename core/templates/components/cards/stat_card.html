<div class="card shadow-sm border-0 h-100">
    <div class="card-body">

        <div class="d-flex justify-content-between align-items-start">

            <div>

                <small class="text-muted d-block">
                    {{ titulo }}
                </small>

                <h3 class="fw-bold mb-0">
                    {{ valor }}
                </h3>

            </div>

            {% if icone %}
                <i class="bi {{ icone }} fs-2 text-{{ cor|default:'primary' }}"></i>
            {% endif %}

        </div>

    </div>
</div>
