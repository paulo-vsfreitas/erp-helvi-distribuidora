{% extends 'core/base.html' %}

{% block title %}Login | ERP Helvi{% endblock %}

{% block content %}

<div style="height:100vh;display:flex;justify-content:center;align-items:center;">

    <div style="
        width:420px;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 5px 20px rgba(0,0,0,.1);
    ">

        <h1 style="text-align:center;color:#111;">
            Helvi
        </h1>

        <p style="
            text-align:center;
            color:#C9A646;
            margin-top:10px;
            margin-bottom:30px;
        ">
            Distribuidora de Armações
        </p>

        {% if form.errors %}
            <div style="
                background:#fdecea;
                color:#b42318;
                padding:12px;
                border-radius:10px;
                margin-bottom:20px;
                font-size:14px;
            ">
                Usuário ou senha inválidos.
            </div>
        {% endif %}

        <form method="post">

            {% csrf_token %}

            <div style="margin-bottom:15px;">
                <label>Usuário</label><br>
                {{ form.username }}
            </div>

            <div style="margin-bottom:10px;">
                <label>Senha</label><br>
                {{ form.password }}
            </div>

            <div style="text-align:right;margin-bottom:20px;">
                <a href="{% url 'password_reset' %}" style="font-size:14px;color:#C9A646;text-decoration:none;">
                    Esqueci minha senha
                </a>
            </div>

            <button type="submit"
                    style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    background:#C9A646;
                    color:white;
                    font-weight:bold;
                    cursor:pointer;">
                Entrar
            </button>

        </form>

    </div>

</div>

{% endblock %}
