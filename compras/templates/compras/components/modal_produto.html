<div id="modalBuscaProduto" class="helvi-modal" hidden>
    
    <div class="helvi-modal-backdrop" data-modal-close></div>

    <div class="helvi-modal-content">

        <div class="helvi-modal-header">
            <h5>Adicionar Produto</h5>

            <button type="button" class="helvi-modal-close" data-modal-close>
                ×
            </button>
        </div>

        <div class="helvi-modal-body">
            <input
                type="text"
                id="campoBuscaProduto"
                class="form-control mb-3"
                placeholder="Digite código, modelo, marca ou coleção...">

            <div id="resultadoBuscaProduto"></div>
        </div>

    </div>

</div>
