<div class="card shadow-sm border-0 mt-4">

    <div class="card-header">
        <h5 class="mb-0">Produtos</h5>
    </div>

    <div class="card-body">

        <div class="mb-3 position-relative">
            <label
                for="busca-produto-inline"
                class="form-label"
            >
                Pesquisar produto
            </label>

            <input
                type="search"
                id="busca-produto-inline"
                class="form-control"
                placeholder="Código, cód. fornecedor, modelo, marca, coleção, cor ou observações..."
                autocomplete="off"
            >

            <small class="text-muted d-block mt-1">
                Clique no campo para visualizar todos os produtos ativos
                ou digite para filtrar.
            </small>

            <div
                id="resultado-produtos-inline"
                class="resultado-produtos-inline"
            ></div>

        <div
            id="itens-vazio"
            class="text-center py-5 text-muted {% if itens_edicao %}d-none{% endif %}"
        >
            Nenhum produto adicionado.
        </div>

        <div
            id="tabela-itens-wrapper"
            class="table-responsive {% if not itens_edicao %}d-none{% endif %}"
        >

            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtde</th>
                        <th>Custo</th>
                        <th>Desc.</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="tabela-itens-body">

                    {% for item in itens_edicao %}
                        <tr>
                            <td>
                                <input
                                    type="hidden"
                                    name="produto_id[]"
                                    value="{{ item.produto.pk }}"
                                >

                                <strong>
                                    {{ item.produto.codigo }}
                                </strong>

                                <br>

                                <span class="text-muted">
                                    {{ item.produto.modelo }}
                                </span>
                            </td>

                            <td>
                                <input
                                    type="number"
                                    name="quantidade[]"
                                    class="form-control quantidade"
                                    value="{{ item.quantidade }}"
                                    min="1"
                                >
                            </td>

                            <td>
                                <input
                                    type="number"
                                    name="custo_unitario[]"
                                    class="form-control custo"
                                    value="{{ item.custo_unitario|stringformat:'s' }}"
                                    step="0.01"
                                    min="0.01"
                                >
                            </td>

                            <td>
                                <input
                                    type="number"
                                    name="desconto_item[]"
                                    class="form-control desconto"
                                    value="{{ item.desconto|stringformat:'s' }}"
                                    step="0.01"
                                    min="0"
                                >
                            </td>

                            <td class="fw-bold total-item">
                                R$ {{ item.total|floatformat:2 }}
                            </td>

                            <td class="text-center">
                                <button
                                    type="button"
                                    class="btn btn-sm btn-outline-danger remover-item"
                                    title="Remover produto"
                                >
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>

    </div>

</div>
