{% extends "core/base.html" %}

{% block title %}Reativar Marca{% endblock %}

{% block content %}

<h1 class="page-title">Reativar Marca</h1>

<p class="page-subtitle">
    Deseja reativar esta marca?
</p>

<div class="form-card">

    <p>
        A marca
        <strong>{{ marca.nome }}</strong>
        voltará a ficar disponível para uso.
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="form-actions">

            <a href="{% url 'catalogo:lista_marcas' %}"
               class="btn btn-secondary">

                Cancelar

            </a>

            <button
                type="submit"
                class="btn btn-primary">

                <i class="bi bi-check-circle"></i>

                Reativar

            </button>

        </div>

    </form>

</div>

{% endblock %}
